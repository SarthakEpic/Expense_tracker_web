<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Expense</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Edit Expense</h1>
        <form action="/edit/{{ expense_id }}" method="post" class="card">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <label>
                Amount (₹)
                <input type="number" name="amount" step="0.01" min="0.01" value="{{ amount }}" required>
            </label>

            <label>
                Category
                <input list="category-options" name="category" value="{{ category }}" required>
            </label>

            <label>
                Description
                <input type="text" name="description" value="{{ description }}">
            </label>

            <datalist id="category-options">
                {% for category_name in categories %}
                <option value="{{ category_name }}"></option>
                {% endfor %}
            </datalist>

            <button type="submit">Save Changes</button>
        </form>

        <p><a href="/" class="back-link">Back to Dashboard</a></p>
    </div>
</body>
</html>
