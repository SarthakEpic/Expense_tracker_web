<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>✏️ Edit Expense</h1>
        <form action="/edit/{{ index }}" method="post" class="card">
            <label>Amount (₹):</label>
            <input type="number" name="amount" step="0.01" value="{{ amount }}" required>

            <label>Category:</label>
            <input type="text" name="category" value="{{ category | e }}" required>

            <label>Description:</label>
            <input type="text" name="description" value="{{ description | e }}">

            <button type="submit">Save Changes</button>
        </form>

        <p><a href="/" class="back-link">⬅️ Back to Dashboard</a></p>
    </div>
</body>
</html>
